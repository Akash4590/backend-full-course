<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            color:#fff;
        }

        .container{
            text-align:center;
            max-width:600px;
            padding:20px;
        }

        h1{
            font-size:120px;
            color:#38bdf8;
            margin-bottom:10px;
        }

        h2{
            font-size:36px;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            color:#d1d5db;
            line-height:30px;
            margin-bottom:35px;
        }

        .btn{
            display:inline-block;
            padding:14px 32px;
            background:#38bdf8;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
            transition:.3s;
        }

        .btn:hover{
            background:#0ea5e9;
            transform:translateY(-3px);
        }

        .emoji{
            font-size:70px;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="emoji">😕</div>

        <h1>404</h1>

        <h2>Oops! Page Not Found</h2>

        <p>
            The page you're looking for doesn't exist or may have been
            moved to another location.
        </p>

        <a href="/" class="btn">← Back to Home</a>

    </div>

</body>
</html>
