<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:380px;
            background:#fff;
            padding:40px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .login-box h1{
            text-align:center;
            margin-bottom:10px;
            color:#222;
        }

        .login-box p{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            outline:none;
            font-size:16px;
        }

        .input-group input:focus{
            border-color:#2563eb;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:17px;
            border-radius:6px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .links{
            margin-top:20px;
            display:flex;
            justify-content:space-between;
            font-size:14px;
        }

        .links a{
            text-decoration:none;
            color:#2563eb;
        }

        .links a:hover{
            text-decoration:underline;
        }

        .home-link{
            text-align:center;
            margin-top:25px;
        }

        .home-link a{
            text-decoration:none;
            color:#444;
            font-weight:bold;
        }

        .home-link a:hover{
            color:#2563eb;
        }
    </style>
</head>
<body>

    <div class="login-box">

        <h1>Welcome Back</h1>
        <p>Login to continue</p>

        <form action="/login" method="POST">

            <div class="input-group">
                <label>Email Address</label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>
            </div>

            <button class="btn" type="submit">
                Login
            </button>

        </form>

        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="#">Create Account</a>
        </div>

        <div class="home-link">
            <a href="/">← Back to Home</a>
            <a href="/about" class="btn">Go to about Page</a>
        </div>

    </div>

</body>
</html>
