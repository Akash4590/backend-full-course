<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        nav{
            background:#222;
            color:white;
            padding:15px 60px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:#00bcd4;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:20px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            transition:.3s;
        }

        nav ul li a:hover{
            color:#00bcd4;
        }

        .hero{
            height:85vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
        }

        .hero h1{
            font-size:50px;
            margin-bottom:15px;
            color:#222;
        }

        .hero p{
            width:600px;
            max-width:90%;
            color:#555;
            line-height:28px;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:12px 30px;
            background:#00bcd4;
            color:white;
            text-decoration:none;
            border-radius:5px;
            transition:.3s;
        }

        .btn:hover{
            background:#0097a7;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
        }
    </style>
</head>
<body>

    <nav>
        <h2>My Website</h2>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/login">Login</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>Welcome to My Website</h1>

        <p>
            This is a simple home page built with HTML and CSS.
            Learn Node.js and Express.js by building real-world projects.
        </p>

        <a href="/login" class="btn">Go to Login Page</a> <br>
        <a href="/about" class="btn">Go to about Page</a>
    </section>

    <footer>
        <p>© 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
